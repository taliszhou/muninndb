name: Publish SDKs

# Triggers on version tag push OR manually from the Actions tab.
# NOTE: We use push→tags instead of release→published because GitHub's
# GITHUB_TOKEN events do not trigger downstream workflows.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build but don't upload)"
        required: false
        default: "false"

jobs:
  # ── Python SDK → PyPI ────────────────────────────────────────────────────
  publish-python:
    name: Build & publish muninn-python + muninndb
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    environment:
      name: pypi
      url: https://pypi.org/p/muninn-python

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Inject version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "SDK_VERSION=${VERSION}" >> "$GITHUB_ENV"
          sed -i "s/version = \"0.0.0-dev\"/version = \"${VERSION}\"/" sdk/python/pyproject.toml
          sed -i "s/__version__ = \"0.0.0-dev\"/__version__ = \"${VERSION}\"/" sdk/python/muninn/__init__.py
          sed -i "s/version = \"0.0.0-dev\"/version = \"${VERSION}\"/" sdk/muninndb/pyproject.toml
          sed -i "s/__version__ = \"0.0.0-dev\"/__version__ = \"${VERSION}\"/" sdk/muninndb/muninndb/__init__.py
          sed -i "s/muninn-python>=0.2.0/muninn-python>=${VERSION}/" sdk/muninndb/pyproject.toml

      - name: Build muninn-python
        working-directory: sdk/python
        run: |
          rm -rf dist/
          python -m build

      - name: Build muninndb (alias stub)
        working-directory: sdk/muninndb
        run: |
          rm -rf dist/
          python -m build

      - name: Collect all artifacts
        run: |
          mkdir -p dist-all
          cp sdk/python/dist/* dist-all/
          cp sdk/muninndb/dist/* dist-all/
          ls -lh dist-all/

      - name: Publish to PyPI
        if: github.event.inputs.dry_run != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-all/

      - name: Dry run — skip upload
        if: github.event.inputs.dry_run == 'true'
        run: echo "Dry run complete. Packages built but not uploaded."

  # ── Node SDK → npm (OIDC trusted publishing — no token) ──────────────────
  publish-node:
    name: Build & publish @muninndb/client to npm
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Inject version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/\"version\": \"0.0.0-dev\"/\"version\": \"${VERSION}\"/" sdk/node/package.json

      - name: Install and build
        working-directory: sdk/node
        run: |
          npm ci
          npm run build

      - name: Publish to npm
        if: github.event.inputs.dry_run != 'true'
        working-directory: sdk/node
        run: npm publish --access public

      - name: Dry run — skip npm publish
        if: github.event.inputs.dry_run == 'true'
        run: echo "Dry run: Node package built but not published."

  # ── PHP SDK → Packagist (via subtree split to muninndb-php repo) ─────────
  publish-php:
    name: Sync PHP SDK to muninndb-php
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Split and push sdk/php to muninndb-php
        env:
          SDK_DEPLOY_KEY: ${{ secrets.PHP_SDK_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "${SDK_DEPLOY_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"

          SPLIT_SHA=$(git subtree split --prefix=sdk/php)
          git remote add php-sdk git@github.com:scrypster/muninndb-php.git || true
          git push php-sdk "${SPLIT_SHA}:refs/heads/main" --force
          git push php-sdk "${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}" --force
