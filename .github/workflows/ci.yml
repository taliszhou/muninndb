name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Go: build + test ────────────────────────────────────────────────────
  go:
    name: Go build & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Cache the binary assets (ORT library + ONNX model).
      # These are ~130MB total and don't change between commits unless the
      # ORT version or model changes. The cache key includes both versions.
      - name: Cache embed assets
        id: asset-cache
        uses: actions/cache@v4
        with:
          path: internal/plugin/embed/assets
          key: embed-assets-ort-1.24.1-minilm-v2-linux

      # Only fetch if the cache missed — saves ~2 min and 130MB on cache hits.
      - name: Fetch embed assets (linux/amd64 only)
        if: steps.asset-cache.outputs.cache-hit != 'true'
        run: make fetch-model _ort-linux-amd64

      - name: Build server
        run: go build -o muninndb-server ./cmd/muninn/...

      - name: Run Go tests
        run: go test ./... -timeout 300s -race

  # ── CLI: integration tests (full binary lifecycle + MCP round-trip) ─────
  cli-integration:
    name: CLI integration tests
    runs-on: ubuntu-latest
    needs: go

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Restore embed assets from cache
        uses: actions/cache@v4
        with:
          path: internal/plugin/embed/assets
          key: embed-assets-ort-1.24.1-minilm-v2-linux

      # Fetch if cache missed (e.g. first run after cache key changes)
      - name: Fetch embed assets if needed
        run: |
          if [ ! -f internal/plugin/embed/assets/model_int8.onnx ]; then
            make fetch-model _ort-linux-amd64
          fi

      # TestMain builds the binary itself; we just need Go + assets present.
      # Tests exercise: help, unknown-command, init, start, stop, restart, status, MCP round-trip.
      - name: Run CLI integration tests
        run: go test -tags integration -v -timeout 120s ./cmd/muninn/...

  # ── Python SDK: integration test against a live server ─────────────────
  python-sdk:
    name: Python SDK integration test
    runs-on: ubuntu-latest
    needs: cli-integration  # run after CLI tests so all integration jobs are sequential

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Restore embed assets from cache
        uses: actions/cache@v4
        with:
          path: internal/plugin/embed/assets
          key: embed-assets-ort-1.24.1-minilm-v2-linux

      # Fetch if cache missed (e.g. first run after cache key changes)
      - name: Fetch embed assets if needed
        run: |
          if [ ! -f internal/plugin/embed/assets/model_int8.onnx ]; then
            make fetch-model _ort-linux-amd64
          fi

      - name: Build server
        run: go build -o muninndb-server ./cmd/muninn/...

      - name: Start MuninnDB server
        run: |
          ./muninndb-server --daemon --data /tmp/muninn-ci-data &
          echo "SERVER_PID=$!" >> $GITHUB_ENV

          # Wait up to 15s for the server to become healthy
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8475/api/stats > /dev/null 2>&1; then
              echo "MuninnDB ready after ${i}s"
              break
            fi
            sleep 1
          done

          curl -sf http://localhost:8475/api/stats | python3 -m json.tool | grep engram_count

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: sdk/python/requirements.txt

      - name: Install Python dependencies
        run: |
          pip install -r sdk/python/requirements.txt
          pip install langchain-core

      - name: Run SDK smoke test (write + activate)
        working-directory: sdk/python
        run: PYTHONPATH=. python examples/write_activate.py

      - name: Run LangChain integration demo
        working-directory: sdk/python
        run: PYTHONPATH=. python examples/langchain_demo.py

      - name: Stop server
        if: always()
        run: |
          if [ -n "$SERVER_PID" ]; then
            kill $SERVER_PID 2>/dev/null || true
          fi
