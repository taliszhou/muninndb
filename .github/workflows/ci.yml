name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Go: build + test ────────────────────────────────────────────────────
  go:
    name: Go build & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Cache the binary assets (ORT library + ONNX model).
      # These are ~130MB total and don't change between commits unless the
      # ORT version or model changes. The cache key includes both versions.
      - name: Cache embed assets
        id: asset-cache
        uses: actions/cache@v4
        with:
          path: internal/plugin/embed/assets
          key: embed-assets-ort-1.24.2-minilm-v2-linux

      # Only fetch if the cache missed — saves ~2 min and 130MB on cache hits.
      - name: Fetch embed assets (linux/amd64 only)
        if: steps.asset-cache.outputs.cache-hit != 'true'
        run: make fetch-model _ort-linux-amd64

      - name: Build server
        run: go build -o muninndb-server ./cmd/muninn/...

      - name: Run Go tests
        run: go test ./... -timeout 300s -race -coverprofile=coverage.out -covermode=atomic

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  # ── CLI: integration tests (full binary lifecycle + MCP round-trip) ─────
  cli-integration:
    name: CLI integration tests
    runs-on: ubuntu-latest
    needs: go

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Restore embed assets from cache
        uses: actions/cache@v4
        with:
          path: internal/plugin/embed/assets
          key: embed-assets-ort-1.24.2-minilm-v2-linux

      # Fetch if cache missed (e.g. first run after cache key changes)
      - name: Fetch embed assets if needed
        run: |
          if [ ! -f internal/plugin/embed/assets/model_int8.onnx ]; then
            make fetch-model _ort-linux-amd64
          fi

      # TestMain builds the binary itself; we just need Go + assets present.
      # Tests exercise: help, unknown-command, init, start, stop, restart, status, MCP round-trip.
      - name: Run CLI integration tests
        run: go test -tags integration -v -timeout 120s ./cmd/muninn/...

  # ── Windows: build + smoke test ───────────────────────────────────────
  windows:
    name: Windows build & smoke test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache embed assets (Windows)
        id: asset-cache-win
        uses: actions/cache@v4
        with:
          path: internal/plugin/embed/assets
          key: embed-assets-ort-1.24.2-minilm-v2-windows

      - name: Fetch model assets
        if: steps.asset-cache-win.outputs.cache-hit != 'true'
        run: |
          New-Item -ItemType Directory -Path internal/plugin/embed/assets -Force | Out-Null
          Write-Host "Downloading model..."
          Invoke-WebRequest -Uri "https://huggingface.co/Xenova/all-MiniLM-L6-v2/resolve/main/onnx/model_int8.onnx" -OutFile "internal/plugin/embed/assets/model_int8.onnx"
          Write-Host "Downloading tokenizer..."
          Invoke-WebRequest -Uri "https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2/resolve/main/tokenizer.json" -OutFile "internal/plugin/embed/assets/tokenizer.json"
        shell: pwsh

      - name: Fetch ORT DLL
        if: steps.asset-cache-win.outputs.cache-hit != 'true'
        run: |
          Write-Host "Downloading ORT 1.24.2 for windows/amd64..."
          Invoke-WebRequest -Uri "https://github.com/microsoft/onnxruntime/releases/download/v1.24.2/onnxruntime-win-x64-1.24.2.zip" -OutFile "$env:TEMP\ort-win-x64.zip"
          Expand-Archive -Path "$env:TEMP\ort-win-x64.zip" -DestinationPath "$env:TEMP\ort-extract" -Force
          $dll = Get-ChildItem -Path "$env:TEMP\ort-extract" -Recurse -Filter "onnxruntime.dll" | Select-Object -First 1
          Copy-Item $dll.FullName -Destination "internal/plugin/embed/assets/onnxruntime_windows_amd64.dll"
          Write-Host "DLL size: $((Get-Item 'internal/plugin/embed/assets/onnxruntime_windows_amd64.dll').Length / 1MB) MB"
        shell: pwsh

      - name: Build server
        run: go build -o muninn.exe ./cmd/muninn/...

      - name: Run unit tests
        run: go test ./cmd/muninn/... -timeout 120s -count=1

      - name: Smoke test — version and help
        run: |
          .\muninn.exe version
          .\muninn.exe help
        shell: pwsh

      - name: Smoke test — start, health check, stop
        run: |
          $dataDir = "$env:TEMP\muninn-ci-data"

          # Start daemon
          $proc = Start-Process -FilePath ".\muninn.exe" -ArgumentList "--daemon","--data",$dataDir -NoNewWindow -PassThru
          $srvPid = $proc.Id
          Write-Host "Started muninn (PID: $srvPid)"

          # Wait for health
          $ready = $false
          for ($i = 1; $i -le 20; $i++) {
            Start-Sleep -Seconds 1
            try {
              $resp = Invoke-WebRequest -Uri "http://localhost:8750/mcp/health" -UseBasicParsing -ErrorAction Stop
              if ($resp.StatusCode -eq 200) {
                Write-Host "MuninnDB ready after ${i}s"
                $ready = $true
                break
              }
            } catch { }
          }

          if (-not $ready) {
            Write-Host "Health check failed — dumping logs"
            if (Test-Path "$dataDir\..\muninn.log") { Get-Content "$dataDir\..\muninn.log" -Tail 30 }
            exit 1
          }

          # Verify MCP endpoint responds
          $health = Invoke-RestMethod -Uri "http://localhost:8750/mcp/health"
          Write-Host "Health response: $($health | ConvertTo-Json -Compress)"

          # Stop
          Stop-Process -Id $srvPid -Force -ErrorAction SilentlyContinue
          Write-Host "Stopped muninn"
        shell: pwsh

  # ── Python SDK: integration test against a live server ─────────────────
  python-sdk:
    name: Python SDK integration test
    runs-on: ubuntu-latest
    needs: cli-integration  # run after CLI tests so all integration jobs are sequential

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Restore embed assets from cache
        uses: actions/cache@v4
        with:
          path: internal/plugin/embed/assets
          key: embed-assets-ort-1.24.2-minilm-v2-linux

      # Fetch if cache missed (e.g. first run after cache key changes)
      - name: Fetch embed assets if needed
        run: |
          if [ ! -f internal/plugin/embed/assets/model_int8.onnx ]; then
            make fetch-model _ort-linux-amd64
          fi

      - name: Build server
        run: go build -o muninndb-server ./cmd/muninn/...

      - name: Start MuninnDB server
        run: |
          ./muninndb-server --daemon --data /tmp/muninn-ci-data &
          echo "SERVER_PID=$!" >> $GITHUB_ENV

          # Wait up to 15s for the MCP health endpoint (public, no auth required).
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8750/mcp/health > /dev/null 2>&1; then
              echo "MuninnDB ready after ${i}s"
              break
            fi
            sleep 1
          done

          curl -sf http://localhost:8750/mcp/health

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: sdk/python/requirements.txt

      - name: Install Python dependencies
        run: pip install -r sdk/python/requirements.txt

      - name: Run SDK smoke test (write + activate)
        working-directory: sdk/python
        run: PYTHONPATH=. python examples/write_activate.py

      - name: Run LangChain integration demo
        working-directory: sdk/python
        run: PYTHONPATH=. python examples/langchain_demo.py

      - name: Stop server
        if: always()
        run: |
          if [ -n "$SERVER_PID" ]; then
            kill $SERVER_PID 2>/dev/null || true
          fi
