services:
  muninndb:
    build: .
    image: muninndb:latest
    container_name: muninndb
    restart: unless-stopped
    ports:
      - "8474:8474"   # MBP binary protocol (Go/Python SDK)
      - "8475:8475"   # REST API
      - "8476:8476"   # Web UI  →  http://localhost:8476
      - "8477:8477"   # gRPC
      - "8750:8750"   # MCP (Claude Desktop, Cursor, VS Code)
    volumes:
      - muninndb-data:/data
    environment:
      # ── Embedder ──────────────────────────────────────────────────────────
      # Bundled all-MiniLM-L6-v2 is on by default — no config needed.
      # To switch to a cloud provider, set one of the vars below and
      # optionally add MUNINN_LOCAL_EMBED: "0" to suppress the bundled model.

      # Ollama
      # MUNINN_OLLAMA_URL: "ollama://ollama:11434/nomic-embed-text"

      # OpenAI text-embedding-3-small
      # MUNINN_OPENAI_KEY: ""

      # Voyage voyage-3
      # MUNINN_VOYAGE_KEY: ""

      # ── LLM enrichment (optional) ─────────────────────────────────────────
      # Ollama enrichment (llama3.2 or any Ollama-hosted model)
      # MUNINN_ENRICH_URL: "ollama://ollama:11434/llama3.2"

      # Anthropic Claude (Claude Haiku is fastest/cheapest)
      # MUNINN_ENRICH_URL: "anthropic://claude-haiku-4-5-20251001"
      # MUNINN_ANTHROPIC_KEY: ""

      # OpenAI enrichment
      # MUNINN_ENRICH_URL: "openai://gpt-4o-mini"
      # MUNINN_ENRICH_API_KEY: ""

      # ── Memory limits ─────────────────────────────────────────────────────
      MUNINN_MEM_LIMIT_GB: "4"
      MUNINN_GC_PERCENT: "200"

      # ── CORS (only needed if UI is accessed from a different origin) ───────
      # MUNINN_CORS_ORIGINS: "http://localhost:3000,https://myapp.example.com"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8750/mcp/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Optional: local Ollama for zero-key embeddings + enrichment ───────────
  # Uncomment this block and set MUNINN_OLLAMA_URL above to use Ollama instead
  # of the bundled embedder.
  #
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: ollama
  #   volumes:
  #     - ollama-data:/root/.ollama
  #   ports:
  #     - "11434:11434"
  #   # Pull the models you want after starting:
  #   #   docker exec ollama ollama pull nomic-embed-text
  #   #   docker exec ollama ollama pull llama3.2

volumes:
  muninndb-data:
  # ollama-data:
